# Orchestrates the full stack: PostgreSQL + FastAPI backend + React/nginx frontend.
#   docker compose up --build
# Then open http://localhost:3000
services:
  db:
    image: postgres:16-alpine
    container_name: ios_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: ios_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-inventory}@db:5432/${POSTGRES_DB:-inventory}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ios_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
