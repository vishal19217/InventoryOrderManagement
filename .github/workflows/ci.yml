name: CI

# Run this workflow on pushes and pull requests targeting the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Fail only on real errors (syntax errors, undefined names)
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Report everything else as warnings without failing the build
          flake8 app --count --exit-zero --max-line-length=120 --statistics

      - name: Smoke test - import the FastAPI app
        run: |
          # Verifies the app boots and all imports resolve
          python -c "from app.main import app; print('FastAPI app imported successfully')"

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build the frontend
        run: npm run build
